<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-sm w-full">
        <div id="resultado">
            <h1 class="text-xl font-bold text-slate-800 mb-4">Validación Oficial</h1>
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
        </div>
    </div>

    <script>
        const certificados = {
            "L-001": { 
                nombre: "LUIS ANTONIO MOLLOAPAZA LLAVE", 
                curso: "Especialista en Seguridad", 
                archivo: "certificado.pdf" // AQUÍ VA EL NOMBRE EXACTO DE TU PDF
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const resDiv = document.getElementById('resultado');

        setTimeout(() => {
            if (certificados[id]) {
                const data = certificados[id];
                resDiv.innerHTML = `
                    <div class="text-green-500 text-6xl mb-4">✓</div>
                    <h2 class="text-2xl font-bold text-slate-800">¡Certificado Auténtico!</h2>
                    <hr class="my-4">
                    <p class="text-xs text-slate-400 uppercase tracking-widest">Titular</p>
                    <p class="text-lg font-bold text-slate-700 mb-4">${data.nombre}</p>
                    <p class="text-xs text-slate-400 uppercase tracking-widest">Curso</p>
                    <p class="text-slate-600 font-medium">${data.curso}</p>
                    
                    <a href="${data.archivo}" target="_blank" class="mt-8 inline-block w-full bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                        VER CERTIFICADO PDF
                    </a>
                    <p class="text-[10px] text-slate-300 mt-6 font-mono uppercase">Registro ID: ${id}</p>
                `;
            } else {
                resDiv.innerHTML = `
                    <div class="text-red-500 text-6xl mb-4">✕</div>
                    <h2 class="text-xl font-bold text-slate-800">No Encontrado</h2>
                    <p class="mt-2 text-slate-500 text-sm">El código de validación no es correcto.</p>
                `;
            }
        }, 1500);
    </script>
</body>
</html>
